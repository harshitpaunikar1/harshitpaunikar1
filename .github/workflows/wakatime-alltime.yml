name: WakaTime All-Time Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "45 0 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: guilyx/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          SECTION_NAME: "waka-simple"
          COMMIT_MESSAGE: "chore: update all-time waka stats"
          BLOCKS: "█░"
          TIME_RANGE: all_time
          SHOW_TIME: true
          SHOW_MASKED_TIME: true
          SHOW_TITLE: true
