name: Lifetime Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *"
  push:
    paths:
      - "scripts/update-lifetime-contributions.js"
      - ".github/workflows/lifetime-contributions.yml"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update lifetime contribution assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_USERNAME: harshitpaunikar1
        run: node scripts/update-lifetime-contributions.js

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/lifetime-contributions.svg
          git commit -m "chore: update lifetime contribution stats"
          git push
